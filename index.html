<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inorganic Smart Lab - Full System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <div id="imageModal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center z-[100] p-4" onclick="this.classList.add('hidden')">
        <div class="bg-white p-2 rounded-lg max-w-sm w-full" onclick="event.stopPropagation()">
            <img id="modalImg" src="" class="w-full h-auto rounded" alt="Item Image">
            <button onclick="document.getElementById('imageModal').classList.add('hidden')" class="w-full mt-3 bg-red-500 text-white py-2 rounded font-bold">ปิด</button>
        </div>
    </div>

    <div id="loginScreen" class="fixed inset-0 bg-blue-600 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full text-center">
            <h2 class="text-2xl font-bold mb-6">Inorganic Smart Lab</h2>
            <form id="loginForm" class="space-y-4">
                <input type="email" id="login_email" placeholder="อีเมล" required class="w-full p-3 border rounded">
                <button type="submit" id="loginBtn" class="w-full bg-blue-600 text-white py-3 rounded font-bold">เข้าสู่ระบบ</button>
            </form>
            <p id="loginError" class="text-red-500 mt-4 hidden"></p>
        </div>
    </div>

    <div id="mainDashboard" class="hidden">
        <header class="bg-blue-600 text-white p-4 flex justify-between items-center">
            <h1 class="font-bold">🔬 Inorganic Smart Lab</h1>
            <button onclick="location.reload()" class="bg-red-500 px-3 py-1 rounded text-sm">ออก</button>
        </header>

        <main class="container mx-auto p-4 grid lg:grid-cols-3 gap-6">
            <section class="lg:col-span-1">
                <div class="bg-white p-6 rounded shadow">
                    <h2 class="font-bold mb-4">🛒 ตะกร้ายืม</h2>
                    <div class="space-y-4">
                        <select id="select_type" onchange="updateForm()" class="w-full p-2 border rounded">
                            <option value="Instrument">เครื่องมือ</option>
                            <option value="Glassware">เครื่องแก้ว</option>
                            <option value="Chemical">สารเคมี</option>
                        </select>
                        <select id="select_item" class="w-full p-2 border rounded"></select>
                        <input type="number" id="qty_input" value="1" class="w-full p-2 border rounded">
                        <button onclick="addToCart()" class="w-full bg-green-600 text-white py-2 rounded font-bold">ใส่ตะกร้า</button>
                    </div>
                    <div id="cartList" class="mt-4 border-t pt-2 text-sm"></div>
                    <button onclick="submitCart()" class="w-full mt-4 bg-blue-600 text-white py-2 rounded">ส่งคำขอ</button>
                </div>
            </section>

            <section class="lg:col-span-2">
                <div class="bg-white p-6 rounded shadow overflow-x-auto">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-gray-100">
                            <tr>
                                <th class="p-2">ชื่อ</th>
                                <th class="p-2">คงเหลือ</th>
                                <th class="p-2">รูป</th>
                            </tr>
                        </thead>
                        <tbody id="stockTableBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxvj0zOc77ZaXn9WKvrGWHkOHsRVtdZoml-hBzCYm-r_8rgxr_Hk-mmy7y2MEkd5kV2/exec";
        let masterData = { instruments: [], glassware: [], chemicals: [] };
        let cart = [];

        // ฟังก์ชันเปิด Modal รูปภาพ
        function showImage(url) {
            document.getElementById('modalImg').src = url;
            document.getElementById('imageModal').classList.remove('hidden');
        }

        // ดึงข้อมูล
        async function loadData() {
            const res = await fetch(API_URL);
            masterData = await res.json();
            renderStock();
            updateForm();
        }

        // อัปเดต Dropdown ตามหมวดหมู่
        function updateForm() {
            const type = document.getElementById('select_type').value;
            const select = document.getElementById('select_item');
            const data = type === 'Instrument' ? masterData.instruments : (type === 'Glassware' ? masterData.glassware : masterData.chemicals);
            select.innerHTML = data.map(i => `<option value="${i.id}">${i.name} (เหลือ: ${i.available || i.total})</option>`).join('');
        }

        // เพิ่มลงตะกร้าพร้อมดักบั๊ค
        function addToCart() {
            const type = document.getElementById('select_type').value;
            const id = document.getElementById('select_item').value;
            const qty = Number(document.getElementById('qty_input').value);
            const item = (type === 'Instrument' ? masterData.instruments : (type === 'Glassware' ? masterData.glassware : masterData.chemicals)).find(i => i.id == id);
            
            if (qty > (item.available || item.total)) {
                alert("❌ จำนวนในสต็อกไม่พอ");
                return;
            }
            cart.push({ type, id, name: item.name, qty });
            document.getElementById('cartList').innerHTML += `<div>${item.name} x ${qty}</div>`;
        }

        // แสดงผลตารางสต็อก
        function renderStock() {
            const allItems = [...masterData.instruments, ...masterData.glassware, ...masterData.chemicals];
            document.getElementById('stockTableBody').innerHTML = allItems.map(i => `
                <tr class="border-b">
                    <td class="p-2">${i.name}</td>
                    <td class="p-2">${i.available || i.total}</td>
                    <td class="p-2 cursor-pointer" onclick="showImage('${i.image_url}')">🖼️</td>
                </tr>
            `).join('');
        }

        // ส่งข้อมูล
        async function submitCart() {
            for(let item of cart) {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({...item, action: 'newBooking'}) });
            }
            alert("บันทึกข้อมูลเรียบร้อย");
            cart = [];
            document.getElementById('cartList').innerHTML = "";
            loadData();
        }

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            loadData();
        };
    </script>
</body>
</html>
