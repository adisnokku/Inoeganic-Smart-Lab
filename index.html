<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inorganic Smart Lab - Enterprise Role System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <div id="loginScreen" class="fixed inset-0 bg-blue-600 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full text-center">
            <span class="text-5xl">🔬</span>
            <h2 class="text-2xl font-bold text-gray-800 mt-4">Inorganic Smart Lab</h2>
            <form id="loginForm" class="space-y-4 text-left mt-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700">อีเมลผู้ใช้งาน</label>
                    <input type="email" id="login_email" placeholder="yourname@uni.ac.th" required class="mt-1 block w-full rounded-md border p-3 bg-gray-50">
                </div>
                <button type="submit" id="loginBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg">เข้าสู่ระบบ</button>
            </form>
        </div>
    </div>

    <div id="mainDashboard" class="hidden">
        <header class="bg-blue-600 text-white p-4 shadow-md">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-lg font-bold">🔬 Inorganic Smart Lab</h1>
                <div class="flex items-center space-x-3">
                    <button onclick="refreshData()" id="refreshBtn" class="bg-white/20 hover:bg-white/30 px-3 py-1 rounded text-xs transition">🔄 รีเฟรช</button>
                    <div class="text-right text-xs">
                        <span id="userDisplay_name" class="block font-semibold">...</span>
                        <span id="userDisplay_role" class="px-2 py-0.5 rounded font-bold">...</span>
                    </div>
                    <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded text-xs">ออก</button>
                </div>
            </div>
        </header>

        <main class="container mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
            <section class="lg:col-span-1 space-y-6">
                <div id="userBookingPanel" class="bg-white p-6 rounded-lg shadow">
                    <h2 class="font-bold border-b pb-2 mb-4">➕ เลือกรายการจอง</h2>
                    <div class="grid grid-cols-3 gap-1 bg-gray-100 p-1 rounded text-[10px] text-center mb-4">
                        <button onclick="switchFormTab('FormInst')" id="tabFormInst" class="py-2 bg-white text-blue-600 rounded shadow">🛠️ เครื่องมือ</button>
                        <button onclick="switchFormTab('FormGlass')" id="tabFormGlass" class="py-2">🧪 เครื่องแก้ว</button>
                        <button onclick="switchFormTab('FormChem')" id="tabFormChem" class="py-2">☣️ สารเคมี</button>
                    </div>
                    <div id="form_instrument" class="space-y-3 text-sm">
                        <select id="select_inst" class="w-full border p-2 rounded"></select>
                        <input type="date" id="inst_date" class="w-full border p-2 rounded">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="time" id="inst_start" class="border p-2 rounded">
                            <input type="time" id="inst_end" class="border p-2 rounded">
                        </div>
                        <button onclick="addInstrumentToCart()" class="w-full bg-blue-600 text-white py-2 rounded">ใส่ตะกร้า</button>
                    </div>
                    <div class="pt-4 mt-4 border-t text-xs">
                        <div id="cartSection" class="mb-2"></div>
                        <button id="submitAllBtn" onclick="submitMasterCart()" class="w-full bg-green-600 text-white py-2 rounded" disabled>ส่งคำขอยืม</button>
                    </div>
                </div>
            </section>

            <section class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-lg shadow">
                    <h2 class="font-bold mb-4">📅 รายการธุรกรรม</h2>
                    <div class="overflow-x-auto"><table class="w-full text-xs" id="bookingTableBody"></table></div>
                </div>
                <div class="bg-white p-6 rounded-lg shadow">
                    <h2 class="font-bold mb-4">📦 คลังสินค้า</h2>
                    <div id="instTableBody" class="text-xs"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxgA3A6sSqyPKsMnEFyQR9K9mzPvAYQUsGDFki9EIojX9x_vzFazcRI3j4Lkq1A0G25/exec";
        let currentUser = null, masterData = null, cart = [];

        async function loadData() {
            const res = await fetch(API_URL);
            masterData = await res.json();
            renderTables();
        }

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.innerText = "กำลังโหลด...";
            await loadData();
            btn.innerText = "🔄 รีเฟรช";
            alert("อัปเดตข้อมูลล่าสุดแล้ว");
        }

        function renderTables() {
            const body = document.getElementById('bookingTableBody');
            body.innerHTML = masterData.bookings.map(b => `
                <tr class="border-b">
                    <td class="p-2">${b.booking_id}</td>
                    <td class="p-2">${b.date}</td>
                    <td class="p-2">${b.status}</td>
                    ${currentUser?.role === 'Admin' ? `<td><button onclick="updateStatus('${b.booking_id}', 'Approved')" class="text-green-600">อนุมัติ</button></td>` : ''}
                </tr>`).join('');
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login_email').value;
            const res = await fetch(`${API_URL}?action=checkUser&email=${email}`);
            const data = await res.json();
            if(data.status === 'found') {
                currentUser = data; currentUser.email = email;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                document.getElementById('userDisplay_name').innerText = data.name;
                document.getElementById('userDisplay_role').innerText = data.role;
                loadData();
            } else { alert("ไม่พบผู้ใช้งาน"); }
        };

        function logout() { location.reload(); }
        // ฟังก์ชันอื่นๆ เช่น switchFormTab, add...ToCart, submitMasterCart คงเดิมตามโครงสร้างก่อนหน้า
    </script>
</body>
</html>
