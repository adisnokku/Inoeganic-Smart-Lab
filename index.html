<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inorganic Smart Lab | Enterprise System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <div id="imageModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-[100] p-4" onclick="this.classList.add('hidden')">
        <div class="bg-white p-2 rounded-2xl max-w-sm w-full shadow-2xl" onclick="event.stopPropagation()">
            <img id="modalImg" src="" class="w-full h-auto rounded-xl">
            <button onclick="document.getElementById('imageModal').classList.add('hidden')" class="w-full mt-4 bg-gray-800 text-white py-2 rounded-xl font-bold">ปิดหน้าต่าง</button>
        </div>
    </div>

    <div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gradient-to-br from-blue-900 via-blue-700 to-indigo-900">
        <div class="absolute inset-0 overflow-hidden opacity-20">
            <div class="absolute -top-10 -left-10 w-96 h-96 bg-blue-500 rounded-full blur-3xl animate-pulse"></div>
        </div>
        <div class="glass relative z-10 w-full max-w-md p-8 rounded-3xl text-center shadow-2xl">
            <div class="w-20 h-20 mx-auto bg-blue-500/20 rounded-full flex items-center justify-center mb-6 border border-white/20 text-4xl">🔬</div>
            <h2 class="text-3xl font-bold text-white mb-2">Inorganic Smart Lab</h2>
            <p class="text-blue-200 mb-8 text-sm">Enterprise Management System</p>
            <form id="loginForm" class="space-y-4">
                <input type="email" id="login_email" placeholder="อีเมลมหาวิทยาลัย" required class="w-full p-4 bg-white/10 border border-white/20 rounded-xl text-white placeholder-blue-300 outline-none focus:ring-2 focus:ring-blue-400">
                <button type="submit" id="loginBtn" class="w-full py-4 bg-blue-500 text-white font-bold rounded-xl shadow-lg hover:bg-blue-400 transition">เข้าสู่ระบบ</button>
            </form>
        </div>
    </div>

    <div id="mainDashboard" class="hidden min-h-screen">
        <header class="bg-blue-600 text-white p-4 shadow-lg flex justify-between items-center">
            <h1 class="font-bold tracking-wider">🔬 INORGANIC SMART LAB</h1>
            <button onclick="location.reload()" class="bg-red-500 px-4 py-1 rounded-full text-xs font-bold hover:bg-red-600">ออกจากระบบ</button>
        </header>

        <main class="container mx-auto p-4 lg:p-8 grid lg:grid-cols-3 gap-8">
            <section class="space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h2 class="font-bold text-gray-700 mb-4 border-b pb-2">🛒 ตะกร้าของฉัน</h2>
                    <div id="cartList" class="text-sm text-gray-600 mb-4 min-h-[50px]"></div>
                    <button onclick="submitCart()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700">ส่งคำขอยืม</button>
                </div>
            </section>

            <section class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="font-bold text-gray-700 mb-4">📦 รายการในคลัง</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-gray-50 text-gray-500">
                            <tr><th class="p-3">ชื่อ</th><th class="p-3">คงเหลือ</th><th class="p-3 text-center">ดูรูป</th></tr>
                        </thead>
                        <tbody id="inventoryBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxvj0zOc77ZaXn9WKvrGWHkOHsRVtdZoml-hBzCYm-r_8rgxr_Hk-mmy7y2MEkd5kV2/exec";
        let masterData = { instruments: [], glassware: [], chemicals: [] };

        async function loadData() {
            const res = await fetch(API_URL);
            masterData = await res.json();
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('inventoryBody');
            const items = [...masterData.instruments, ...masterData.glassware, ...masterData.chemicals];
            tbody.innerHTML = items.map(i => `
                <tr class="border-b border-gray-100 hover:bg-gray-50">
                    <td class="p-3 font-medium">${i.name}</td>
                    <td class="p-3 text-blue-600 font-bold">${i.available || i.total}</td>
                    <td class="p-3 text-center">
                        <button onclick="showImage('${i.image_url}')" class="bg-blue-100 px-3 py-1 rounded-lg text-blue-700 text-xs font-bold">ดูรูป</button>
                    </td>
                </tr>
            `).join('');
        }

        function showImage(url) {
            document.getElementById('modalImg').src = url;
            document.getElementById('imageModal').classList.remove('hidden');
        }

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            loadData();
        };

        function submitCart() { alert("บันทึกคำขอเรียบร้อย"); }
    </script>
</body>
</html>
